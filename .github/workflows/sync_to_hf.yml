name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Sync code files only to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python << 'PYTHON'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          REPO_ID = "mlresearcher05/rice-disease-detection"

          # Files and folders to SKIP — models live on HF directly
          SKIP = {
              "trained_models",
              ".git",
              ".github",
              "__pycache__",
              ".pytest_cache",
              ".env",
              ".venv",
          }
          SKIP_EXTENSIONS = {".pyc", ".pyo", ".npy", ".keras", ".pth", ".pkl", ".h5", ".tflite"}

          uploaded = []
          skipped  = []

          for root, dirs, files in os.walk("."):
              # Remove skipped folders from traversal
              dirs[:] = [d for d in dirs if d not in SKIP and not d.startswith(".")]

              for filename in files:
                  local_path = os.path.join(root, filename)
                  # Clean up path: remove leading ./
                  repo_path = local_path.lstrip("./").lstrip(".\\")
                  repo_path = repo_path.replace("\\", "/")

                  # Skip by extension
                  ext = os.path.splitext(filename)[1].lower()
                  if ext in SKIP_EXTENSIONS:
                      skipped.append(repo_path)
                      continue

                  # Skip hidden files
                  if filename.startswith("."):
                      skipped.append(repo_path)
                      continue

                  # Upload file
                  try:
                      api.upload_file(
                          path_or_fileobj=local_path,
                          path_in_repo=repo_path,
                          repo_id=REPO_ID,
                          repo_type="space",
                      )
                      uploaded.append(repo_path)
                      print(f"  ✓ {repo_path}")
                  except Exception as e:
                      print(f"  ✗ {repo_path} — {e}")

          print(f"\n✅ Uploaded : {len(uploaded)} files")
          print(f"⏭️  Skipped  : {len(skipped)} files (models/cache)")
          PYTHON